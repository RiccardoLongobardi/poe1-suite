[project]
name = "poe1-pricing"
version = "0.1.0"
description = "Pricing lookup for PoE 1 items & currency — stand-alone, reusable across FOB, Faustus, and future tools."
readme = "README.md"
requires-python = ">=3.12"
license = { file = "../../LICENSE" }
authors = [{ name = "Riccardo Longobardi", email = "ric.longobardi@outlook.it" }]

dependencies = [
    "poe1-core",
    "poe1-shared",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/poe1_pricing"]
