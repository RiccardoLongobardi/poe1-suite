[project]
name = "poe1-fob"
version = "0.1.0"
description = "FOB — Frusta Oracle Builder. A PoE 1 build advisor."
readme = "README.md"
requires-python = ">=3.12"
license = { file = "../../LICENSE" }
authors = [{ name = "Riccardo Longobardi", email = "ric.longobardi@outlook.it" }]

dependencies = [
    "poe1-core",
    "poe1-shared",
    "poe1-builds",
    "anthropic>=0.40",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/poe1_fob"]
